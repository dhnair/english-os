name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automatically caches node dependencies

      # Caches the Docusaurus Webpack outputs
      - name: Cache Docusaurus Assets
        uses: actions/cache@v4
        with:
          path: |
            .docusaurus
            node_modules/.cache
          key: ${{ runner.os }}-docusaurus-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-docusaurus-

      - name: Install dependencies
        run: npm ci # Using 'ci' is faster and stricter than 'install' for pipelines

      - name: Build website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build